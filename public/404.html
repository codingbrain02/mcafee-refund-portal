<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Page Not Found | Refund Portal</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        color: #172033;
        background: #f5f7fa;
      }
      * { box-sizing: border-box; }
      body { display: grid; min-height: 100vh; margin: 0; place-items: center; padding: 24px; }
      main { width: min(100%, 520px); padding: 32px; border-radius: 8px; background: #fff; box-shadow: 0 8px 28px rgba(15, 23, 42, .09); }
      span { color: #075b68; font-size: 13px; font-weight: 800; text-transform: uppercase; }
      h1 { margin: 10px 0 12px; font-size: 32px; line-height: 1.15; }
      p { margin: 0 0 22px; color: #5e6b7d; line-height: 1.55; }
      a { display: inline-flex; min-height: 42px; align-items: center; padding: 0 16px; border-radius: 6px; background: #075b68; color: #fff; font-weight: 700; text-decoration: none; }
      a:focus-visible { outline: 3px solid rgba(7, 91, 104, .25); outline-offset: 3px; }
    </style>
  </head>
  <body>
    <main>
      <span>404</span>
      <h1>Page not found</h1>
      <p>The page you requested is not part of the refund portal.</p>
      <a href="/">Return to the portal</a>
    </main>
  </body>
</html>
